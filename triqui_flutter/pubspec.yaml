name: triqui_flutter
description: Juego clásico de Triqui (Tic-Tac-Toe) para 2 jugadores con estadísticas y temas elegantes
version: 1.0.0+2

# Versión del SDK de Dart necesaria
environment:
  sdk: '>=2.19.0 <4.0.0'

# Dependencias del proyecto
dependencies:
  flutter:
    sdk: flutter
  
  # Material Design (UI components de Google)
  cupertino_icons: ^1.0.2
  
  # Google AdMob para anuncios
  google_mobile_ads: ^5.1.0
  
  # Para almacenar contador de victorias
  shared_preferences: ^2.2.2
  
  # Para reproducir sonidos
  audioplayers: ^5.2.1
  
  # Para manejo de estado
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/triqui_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/triqui_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/icon/
